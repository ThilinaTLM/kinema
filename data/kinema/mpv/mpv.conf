#
# Kinema-managed mpv config. Do not edit — this file is shipped as part
# of Kinema and overwritten on install. Kinema does not load
# ~/.config/mpv and will not read user edits to this file.
#
# For a custom mpv experience (your own scripts, bindings, or tuning)
# use Kinema's external mpv backend (Settings → Playback → Player:
# "mpv" instead of "Embedded").

# ---- Output / decoding ---------------------------------------------------
vo=libmpv
hwdec=auto-safe
profile=gpu-hq

# ---- UI ------------------------------------------------------------------
# Kinema provides its own Qt overlay (transport, title, menus). The
# built-in OSC would fight it, so it's disabled here and never
# re-enabled at runtime.
osc=no
osd-bar=yes
osd-font-size=28
osd-duration=1500

# Cursor hiding is handled by Kinema (both in fullscreen and windowed
# mode); mpv's own auto-hide would race ours.
cursor-autohide=no

# No window chrome — Kinema owns the window.
border=no

# ---- Streaming cache tuned for Real-Debrid's CDN -------------------------
# 30 s ahead gives enough headroom to absorb typical CDN latency
# spikes without ballooning memory.
cache=yes
cache-secs=30
demuxer-max-bytes=150MiB
demuxer-max-back-bytes=50MiB
demuxer-readahead-secs=20

# ---- Behaviour -----------------------------------------------------------
keep-open=no
ytdl=no
idle=once

# ---- Subtitles -----------------------------------------------------------
# Language preferences (alang/slang) are applied at runtime from
# PlayerSettings; the defaults below govern rendering only.
sub-auto=exact
sub-ass-override=force
sub-scale-with-window=yes
