#
# Kinema-managed mpv config. Do not edit — this file is shipped as part
# of Kinema and overwritten on install. Kinema does not load
# ~/.config/mpv and will not read user edits to this file.
#
# For a custom mpv experience (your own scripts, bindings, or tuning)
# use Kinema's external mpv backend (Settings → Playback → Player:
# "mpv" instead of "Embedded").

# ---- Output / decoding ---------------------------------------------------
vo=libmpv
hwdec=auto-safe
profile=gpu-hq

# ---- UI ------------------------------------------------------------------
# Kinema's chrome is rendered by the QtQuick scene that hosts the
# `MpvVideoItem` (transport bar, title strip, resume prompt,
# next-episode banner, skip pill, cheat sheet, pickers). mpv's
# built-in OSC is disabled because Qt owns the same visual surface.
# stats.lua (ships with mpv) stays on so power users can pop a stats
# HUD with `I`.
osc=no
load-stats-overlay=yes
osd-bar=no
osd-duration=1500

# Cursor hiding is owned by the QML scene so the policy is the same
# in fullscreen and windowed mode.
cursor-autohide=no

# No window chrome — Kinema owns the outer window.
border=no

# ---- Streaming cache tuned for Real-Debrid's CDN -------------------------
# 30 s ahead gives enough headroom to absorb typical CDN latency
# spikes without ballooning memory.
cache=yes
cache-secs=30
demuxer-max-bytes=150MiB
demuxer-max-back-bytes=50MiB
demuxer-readahead-secs=20

# Per-operation network timeout. Without this, libavformat falls back
# to its default which can wait essentially forever on a stalled
# connection — e.g. a Torrentio /resolve/ URL whose backend chain
# (Real-Debrid → CDN) is slow to respond. Capping it here means a
# stuck queue item ends up emitting `end-file` with an error reason
# and the queue auto-skips to the next item instead of leaving the
# player on a black loading screen indefinitely.
network-timeout=60

# ---- Behaviour -----------------------------------------------------------
keep-open=no
ytdl=no
# Kinema reuses a single libmpv core across every queue item: the
# `PlayerWindow` (and the `MpvVideoItem` it hosts) stays alive for
# the application lifetime and just gets new `loadfile` commands as
# the queue advances. With `idle=once` mpv exits its playback engine
# the moment the first file ends and the implicit playlist drains —
# any subsequent `loadfile` then sits forever with no `file-loaded`
# / `end-file` reply, which surfaces as a black loading screen on
# every queue item past the first. `idle=yes` is the correct
# pairing for a long-lived host: stay idle indefinitely between
# items and pick up the next `loadfile` immediately.
idle=yes

# ---- Subtitles -----------------------------------------------------------
# Language preferences (alang/slang) are applied at runtime from
# PlayerSettings; the defaults below govern rendering only.
sub-auto=exact
sub-ass-override=force
sub-scale-with-window=yes
