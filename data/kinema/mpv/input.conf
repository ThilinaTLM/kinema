#
# Kinema-managed mpv input bindings. Do not edit — this file is
# shipped with Kinema and overwritten on install.
#
# Keys intentionally NOT bound here so they can never kill the
# embedded player:
#   q / Q / ZZ / ctrl+c   -> no quit binding
#   stop / loadfile etc.  -> reserved for Kinema commands
#
# Keys reserved by Kinema (handled by Qt, never forwarded to mpv):
#   Esc                 leave fullscreen / close
#   F                   toggle fullscreen
#   ?                   keyboard cheat sheet
#   I                   stats overlay
#   N / Shift+N         next / previous episode            (M3)

# ---- Transport -----------------------------------------------------------
SPACE        cycle pause
MBTN_LEFT    cycle pause

LEFT         seek -5
RIGHT        seek  5
Shift+LEFT   seek -60
Shift+RIGHT  seek  60
UP           seek  60
DOWN         seek -60

# ---- Audio / subtitles ---------------------------------------------------
m            cycle mute
j            cycle sub
J            cycle sub down
#            cycle audio

# ---- Speed ---------------------------------------------------------------
[            add speed -0.1
]            add speed  0.1
BS           set speed 1.0

# ---- Volume --------------------------------------------------------------
WHEEL_UP     add volume  2
WHEEL_DOWN   add volume -2
0            add volume  2
9            add volume -2
