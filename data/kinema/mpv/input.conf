#
# Kinema-managed mpv input bindings. Do not edit — this file is
# shipped with Kinema and overwritten on install.
#
# Keys intentionally NOT bound here so they can never kill the
# embedded player:
#   q / Q / ZZ / ctrl+c   -> no quit binding
#   stop / loadfile etc.  -> reserved for Kinema commands
#
# Keys owned by the QtQuick chrome (handled by PlayerInputs.qml).
# Never bind them here — mpv would race the QML handler:
#   MBTN_LEFT           click-to-pause / drag-to-seek in the seek bar
#   F                   toggle fullscreen (via PlayerWindow)
#   Esc                 leave fullscreen / close
#   ?                   keyboard cheat sheet
#   I                   stats overlay (delegates to mpv's stats.lua)
#   N / Shift+N         play next episode / cancel auto-next
#   SPACE / K           play / pause
#   J / L               seek -10 / +10
#   M                   mute toggle
#   Up / Down arrows    volume ±5

# ---- Transport (Shift-modified seek for power users) --------------------
Shift+LEFT   seek -60
Shift+RIGHT  seek  60

# ---- Audio / subtitles ---------------------------------------------------
#            cycle audio

# ---- Speed ---------------------------------------------------------------
BS           set speed 1.0

# ---- Volume --------------------------------------------------------------
0            add volume  2
9            add volume -2
