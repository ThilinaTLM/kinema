#
# Kinema-managed mpv input bindings. Do not edit — this file is
# shipped with Kinema and overwritten on install.
#
# Keys intentionally NOT bound here so they can never kill the
# embedded player:
#   q / Q / ZZ / ctrl+c   -> no quit binding
#   stop / loadfile etc.  -> reserved for Kinema commands
#
# Keys reserved by the Kinema overlay script
# (data/kinema/mpv/scripts/kinema-overlays.lua). Never bind them
# here — the script owns them and sometimes forwards back to the
# Kinema host via script-message-to:
#   MBTN_LEFT           overlay zone hit-test (falls back to pause)
#   F                   toggle fullscreen (via Kinema host)
#   Esc                 dismiss overlays / leave fullscreen / close
#   ?                   keyboard cheat sheet
#   I                   stats overlay (delegates to stats.lua)
#   N / Shift+N         play next episode / cancel auto-next

# ---- Transport -----------------------------------------------------------
SPACE        cycle pause

LEFT         seek -5
RIGHT        seek  5
Shift+LEFT   seek -60
Shift+RIGHT  seek  60
UP           seek  60
DOWN         seek -60

# ---- Audio / subtitles ---------------------------------------------------
m            cycle mute
j            cycle sub
J            cycle sub down
#            cycle audio

# ---- Speed ---------------------------------------------------------------
[            add speed -0.1
]            add speed  0.1
BS           set speed 1.0

# ---- Volume --------------------------------------------------------------
WHEEL_UP     add volume  2
WHEEL_DOWN   add volume -2
0            add volume  2
9            add volume -2
