<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3daee9"/>
      <stop offset="1" stop-color="#1d5f8c"/>
    </linearGradient>
  </defs>
  <!-- Film reel disc -->
  <rect x="2" y="2" width="28" height="28" rx="5" fill="url(#bg)"/>
  <!-- Sprocket holes along the left edge, evoking film -->
  <g fill="#0b2a3d">
    <rect x="4" y="6" width="3" height="3" rx="0.5"/>
    <rect x="4" y="11" width="3" height="3" rx="0.5"/>
    <rect x="4" y="16" width="3" height="3" rx="0.5"/>
    <rect x="4" y="21" width="3" height="3" rx="0.5"/>
    <rect x="25" y="6" width="3" height="3" rx="0.5"/>
    <rect x="25" y="11" width="3" height="3" rx="0.5"/>
    <rect x="25" y="16" width="3" height="3" rx="0.5"/>
    <rect x="25" y="21" width="3" height="3" rx="0.5"/>
  </g>
  <!-- Play triangle centered -->
  <polygon points="13,10 13,22 23,16" fill="#ffffff"/>
</svg>
