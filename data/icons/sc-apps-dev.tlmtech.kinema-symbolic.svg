<!--
    Monochrome tray / status variant of the Kinema app icon.

    Breeze convention: the Plasma System Tray recolors the element
    whose fill references the `.ColorScheme-Text` class to match the
    panel foreground. We therefore drop the colored rounded-square
    tile and paint only the K+play glyph, so the icon blends into
    light and dark panels the way other KStatusNotifierItem icons do.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1224 1224">
  <defs>
    <style id="current-color-scheme" type="text/css">
      .ColorScheme-Text { color:#232629; }
    </style>
  </defs>
